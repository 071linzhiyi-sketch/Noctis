<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>额度查询 · como71</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 60px;
        }

        .header {
            padding-top: 10vh;
            padding-bottom: 40px;
            text-align: center;
            width: 88%;
            max-width: 660px;
        }
        .header .logo {
            font-family: 'Great Vibes', cursive;
            font-size: 10em;
            color: rgba(255,255,255,0.95);
            text-shadow: 0 3px 24px rgba(0,0,0,0.3), 0 0 60px rgba(255,255,255,0.12);
            letter-spacing: 5px;
            line-height: 1.1;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
            white-space: nowrap;
        }
        .header .sub {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 8px;
            margin-top: 10px;
            font-weight: 400;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 22px;
            padding: 44px 40px;
            width: 88%;
            max-width: 660px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.25);
            position: relative;
            z-index: 10;
        }

        .card h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 28px;
            letter-spacing: 6px;
            text-align: center;
            text-shadow: 0 1px 6px rgba(0,0,0,0.15);
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .card input {
            flex: 1;
            min-width: 0;
            padding: 16px 18px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: monospace;
            outline: none;
            transition: all 0.3s;
        }
        .card input::placeholder { color: rgba(255,255,255,0.4); }
        .card input:focus {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.25);
        }

        .dropdown-wrap {
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }
        .dropdown-btn {
            height: 100%;
            padding: 0 18px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            font-family: "Noto Sans SC", sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: all 0.3s;
            letter-spacing: 1px;
            min-width: 110px;
            justify-content: center;
        }
        .dropdown-btn:hover { background: rgba(255,255,255,0.3); }
        .dropdown-btn .arrow {
            font-size: 10px;
            transition: transform 0.2s;
        }
        .dropdown-btn.open .arrow { transform: rotate(180deg); }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: rgba(30,30,30,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 6px;
            min-width: 160px;
            max-height: 320px;
            overflow-y: auto;
            z-index: 200;
            display: none;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu::-webkit-scrollbar { width: 4px; }
        .dropdown-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .dropdown-item {
            padding: 10px 14px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dropdown-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .dropdown-item.active { background: rgba(255,255,255,0.15); color: #fff; }
        .dropdown-item .item-unit {
            font-size: 12px;
            opacity: 0.5;
        }

        .query-btn {
            padding: 16px 24px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: "Noto Sans SC", sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .query-btn:hover { background: rgba(255,255,255,0.35); }
        .query-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .result {
            margin-top: 28px;
            padding: 28px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            display: none;
        }
        .result.show { display: block; }

        .balance-label {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255,255,255,0.55);
            margin-bottom: 4px;
            letter-spacing: 2px;
        }
        .balance-value {
            font-size: 38px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 1px 8px rgba(0,0,0,0.1);
        }
        .balance-unit {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            margin-left: 4px;
        }
        .stats {
            margin-top: 16px;
            display: flex;
            gap: 24px;
        }
        .stat-item { flex: 1; }
        .stat-label {
            font-size: 11px;
            font-weight: 400;
            color: rgba(255,255,255,0.4);
            margin-bottom: 2px;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
        }
        .unlimited-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 8px;
            letter-spacing: 1px;
        }
        .error-text {
            color: #ffb3b3;
            font-size: 14px;
            font-weight: 700;
        }
        .site-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .sites-section {
            margin-top: 36px;
            width: 88%;
            max-width: 660px;
        }
        .sites-section h2 {
            font-size: 17px;
            font-weight: 700;
            color: rgba(255,255,255,0.85);
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 22px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.2);
        }

        .sites-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .site-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        }
        .site-card:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255,255,255,0.35);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .site-card:active { transform: translateY(0); }
        .site-card .site-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        .site-card .site-copy-hint {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .disclaimer-card {
            margin-top: 16px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 16px 20px;
            width: 100%;
        }
        .disclaimer-card p {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            line-height: 1.8;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .disclaimer-card a {
            color: rgba(255,255,255,0.5);
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
        }
        .disclaimer-card a:hover { color: rgba(255,255,255,0.7); }

        /* 联系弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: rgba(40,40,40,0.9);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            padding: 36px 40px;
            min-width: 280px;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: rgba(255,255,255,0.7); }
        .modal-title {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .modal-qq {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            font-family: monospace;
            letter-spacing: 2px;
            padding: 12px 0;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-qq:hover { background: rgba(255,255,255,0.15); }
        .modal-hint {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30,30,30,0.95);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 999;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
        }
        .footer .footer-logo {
            font-family: 'Great Vibes', cursive;
            font-size: 22px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.1);
        }
        .footer .footer-credit {
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .card, .sites-section { width: 92%; }
            .card { padding: 32px 24px; }
            .header { width: 92%; }
            .header .logo { font-size: 7em; }
        }

        @media (max-width: 480px) {
            .page { padding: 0 12px 40px; }
            .header { padding-top: 6vh; padding-bottom: 24px; width: 96%; }
            .header .logo { font-size: 5em; width: 100%; }
            .header .sub { font-size: 11px; letter-spacing: 5px; }

            .card, .sites-section { width: 96%; }
            .card { padding: 24px 16px; border-radius: 18px; }
            .card h1 { font-size: 17px; letter-spacing: 4px; margin-bottom: 20px; }

            .input-row { flex-wrap: wrap; }
            .card input {
                flex: 1 1 100%;
                padding: 14px 14px;
                font-size: 14px;
            }
            .dropdown-wrap { flex: 1 1 48%; }
            .dropdown-btn { width: 100%; min-width: unset; padding: 12px 14px; }
            .query-btn {
                flex: 1 1 48%;
                padding: 12px 0;
                text-align: center;
            }
            .dropdown-menu { left: 0; right: auto; }

            .result { padding: 20px; margin-top: 20px; }
            .balance-value { font-size: 30px; }
            .stats { gap: 16px; }
            .stat-value { font-size: 15px; }

            .sites-grid { grid-template-columns: 1fr; gap: 10px; }
            .site-card { padding: 16px 16px; border-radius: 12px; }

            .modal-box { margin: 0 20px; padding: 28px 24px; }

            .footer { margin-top: 28px; }
            .footer .footer-logo { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="page">

        <div class="header">
            <div class="logo">como71</div>
            <div class="sub">API SERVICE</div>
        </div>

        <div class="card">
            <h1>额 度 查 询</h1>
            <div class="input-row">
                <input type="text" id="apiKey" placeholder="请输入 API Key">
                <div class="dropdown-wrap">
                    <div class="dropdown-btn" id="dropdownBtn" onclick="toggleDropdown()">
                        <span id="selectedSiteName">Nova AI</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="dropdown-menu" id="dropdownMenu"></div>
                </div>
                <button class="query-btn" id="queryBtn" onclick="query()">查 询</button>
            </div>
            <div class="result" id="result"></div>
        </div>

        <div class="sites-section">
            <h2>注 册 链 接</h2>
            <div class="sites-grid" id="sitesGrid"></div>
            <div class="disclaimer-card">
                <p>本作者不参与任何站点制作及收益，仅为分享。<br>如有不妥请<a onclick="openModal()">联系</a>删除。</p>
            </div>
        </div>

        <div class="footer">
            <div class="footer-logo">como71</div>
            <div class="footer-credit">由人类携手小机 como 共同制作</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModalDirect()">✕</button>
            <div class="modal-title">联 系 作 者</div>
            <div class="modal-qq" onclick="copyQQ()">3847193577</div>
            <div class="modal-hint">点击复制 QQ 号</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const SITES = [
            { key: "novai",     name: "Nova AI",    base: "https://us.novaiapi.com",    unit: "¥",  invite: "https://us.novaiapi.com/register?aff=LkRr" },
            { key: "fuka",      name: "芙卡",       base: "https://api.fuka.win",       unit: "🍭", invite: "https://api.fuka.win/register?aff=aZ60" },
            { key: "ciwei",     name: "刺猬",       base: "https://cf-cc.cwapi.vip",    unit: "$",  invite: "https://cf-cc.cwapi.vip/register?aff=eQnA" },
            { key: "spritnest", name: "Spritnest",  base: "https://spritnest.com",      unit: "$",  invite: "https://spritnest.com/register?aff=3PfK" },
            { key: "zhouzi",    name: "肘子",       base: "https://api.dzzi.ai",        unit: "$",  invite: "https://api.dzzi.ai/register?aff=gVOF" },
            { key: "selart",    name: "赛艺",       base: "https://open.selart.cc",     unit: "$",  invite: "https://open.selart.cc/register?aff=C60t" },
            { key: "xiongmao",  name: "熊猫",       base: "https://api520.pro",         unit: "🍚", invite: "https://api520.pro/register?aff=fzWY" },
            { key: "tiancheng", name: "甜橙",       base: "https://i.orangepie.org",    unit: "🍊", invite: "https://i.orangepie.org/register?aff=bVXk" },
            { key: "zhailian",  name: "宅恋",       base: "https://az.zlapi.vip",       unit: "¥",  invite: "https://az.zlapi.vip/register?aff=OoOn" },
            { key: "youmi",     name: "悠米",       base: "https://api.meeyo.org",      unit: "🍬", invite: "https://meeyo.org/register?aff=VfXu" },
            { key: "msui",      name: "MSUI",       base: "https://www.msuicode.com",   unit: "¥",  invite: "https://www.msuicode.com/register?aff=ASzT" }
        ];

        let currentSiteIndex = 0;
        const UNLIMITED_THRESHOLD = 9999;

        function initDropdown() {
            const menu = document.getElementById("dropdownMenu");
            menu.innerHTML = SITES.map((s, i) =>
                '<div class="dropdown-item' + (i === 0 ? ' active' : '') + '" data-index="' + i + '" onclick="selectSite(' + i + ')">' +
                    '<span>' + s.name + '</span>' +
                    '<span class="item-unit">' + s.unit + '</span>' +
                '</div>'
            ).join("");
        }

        function initSiteCards() {
            const grid = document.getElementById("sitesGrid");
            grid.innerHTML = SITES.map(s =>
                '<div class="site-card" onclick="copyInvite(\'' + s.invite + '\', \'' + s.name + '\')">' +
                    '<div class="site-name">' + s.name + ' ' + s.unit + '</div>' +
                    '<div class="site-copy-hint">点击复制邀请链接</div>' +
                '</div>'
            ).join("");
        }

        function toggleDropdown() {
            const menu = document.getElementById("dropdownMenu");
            const btn = document.getElementById("dropdownBtn");
            menu.classList.toggle("show");
            btn.classList.toggle("open");

            if (menu.classList.contains("show")) {
                setTimeout(() => {
                    document.addEventListener("click", outsideClickHandler);
                }, 0);
            } else {
                document.removeEventListener("click", outsideClickHandler);
            }
        }

        function outsideClickHandler(e) {
            const wrap = document.querySelector(".dropdown-wrap");
            if (!wrap.contains(e.target)) {
                document.getElementById("dropdownMenu").classList.remove("show");
                document.getElementById("dropdownBtn").classList.remove("open");
                document.removeEventListener("click", outsideClickHandler);
            }
        }

        function selectSite(index) {
            currentSiteIndex = index;
            const site = SITES[index];
            document.getElementById("selectedSiteName").textContent = site.name;
            document.getElementById("dropdownMenu").classList.remove("show");
            document.getElementById("dropdownBtn").classList.remove("open");
            document.getElementById("result").className = "result";
            document.removeEventListener("click", outsideClickHandler);

            document.querySelectorAll(".dropdown-item").forEach((el, i) => {
                el.classList.toggle("active", i === index);
            });
        }

        function copyInvite(url, name) {
            navigator.clipboard.writeText(url).then(() => {
                showToast(name + " 邀请链接已复制");
            }).catch(() => {
                fallbackCopy(url);
                showToast(name + " 邀请链接已复制");
            });
        }

        function copyQQ() {
            navigator.clipboard.writeText("3847193577").then(() => {
                showToast("QQ 号已复制");
            }).catch(() => {
                fallbackCopy("3847193577");
                showToast("QQ 号已复制");
            });
        }

        function fallbackCopy(text) {
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
        }

        function openModal() {
            document.getElementById("modalOverlay").classList.add("show");
        }
        function closeModal(e) {
            if (e.target === document.getElementById("modalOverlay")) {
                document.getElementById("modalOverlay").classList.remove("show");
            }
        }
        function closeModalDirect() {
            document.getElementById("modalOverlay").classList.remove("show");
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2000);
        }

        async function query() {
            const key = document.getElementById("apiKey").value.trim();
            const btn = document.getElementById("queryBtn");
            const result = document.getElementById("result");
            const site = SITES[currentSiteIndex];

            if (!key) { showError("请输入 API Key"); return; }

            btn.disabled = true;
            btn.textContent = "查询中...";
            result.className = "result";

            try {
                const headers = { "Authorization": "Bearer " + key };

                const [subResp, usageResp] = await Promise.all([
                    fetch(site.base + "/v1/dashboard/billing/subscription", { headers }),
                    fetch(site.base + "/v1/dashboard/billing/usage?start_date=2024-01-01&end_date=2026-12-31", { headers })
                ]);

                if (!subResp.ok || !usageResp.ok) throw new Error("Key 无效或已过期");

                const subData = await subResp.json();
                const usageData = await usageResp.json();

                const total = subData.hard_limit_usd || 0;
                const usedRaw = usageData.total_usage || 0;
                const used = usedRaw / 100;
                const isUnlimited = total > UNLIMITED_THRESHOLD;
                const u = site.unit;

                if (isUnlimited) {
                    result.innerHTML =
                        '<div class="balance-label">已消耗</div>' +
                        '<div class="balance-value">' + used.toFixed(2) + '<span class="balance-unit"> ' + u + '</span></div>' +
                        '<div class="unlimited-tag">无限额令牌</div>' +
                        '<div class="site-tag">' + site.name + '</div>';
                } else {
                    const remaining = Math.max(0, total - used);
                    result.innerHTML =
                        '<div class="balance-label">剩余额度</div>' +
                        '<div class="balance-value">' + remaining.toFixed(2) + '<span class="balance-unit"> ' + u + '</span></div>' +
                        '<div class="stats">' +
                            '<div class="stat-item"><div class="stat-label">总额度</div><div class="stat-value">' + total.toFixed(2) + ' ' + u + '</div></div>' +
                            '<div class="stat-item"><div class="stat-label">已消耗</div><div class="stat-value">' + used.toFixed(2) + ' ' + u + '</div></div>' +
                        '</div>' +
                        '<div class="site-tag">' + site.name + '</div>';
                }

                result.className = "result show";

            } catch (e) { showError(e.message); }

            btn.disabled = false;
            btn.textContent = "查 询";
        }

        function showError(msg) {
            const result = document.getElementById("result");
            result.className = "result show";
            result.innerHTML = '<div class="error-text">' + msg + '</div>';
        }

        document.getElementById("apiKey").addEventListener("keydown", function(e) {
            if (e.key === "Enter") query();
        });

        initDropdown();
        initSiteCards();
    </script>
</body>
</html>
