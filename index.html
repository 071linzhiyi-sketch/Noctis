<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>额度查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 24px;
            color: #fff;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: monospace;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #555; }
        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #111;
            border-radius: 8px;
            display: none;
        }
        .result.show { display: block; }
        .result.error { border: 1px solid #ff4444; }
        .result.success { border: 1px solid #333; }
        .balance-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .balance-value {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
        }
        .balance-unit {
            font-size: 14px;
            color: #888;
            margin-left: 4px;
        }
        .stats {
            margin-top: 16px;
            display: flex;
            gap: 24px;
        }
        .stat-item {
            flex: 1;
        }
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
        }
        .stat-value {
            font-size: 15px;
            color: #aaa;
        }
        .error-text {
            color: #ff4444;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>额度查询</h1>
        <div class="input-group">
            <label>API Key</label>
            <input type="text" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
        </div>
        <button id="queryBtn" onclick="query()">查询</button>
        <div class="result" id="result"></div>
    </div>
    <script>
        const API_BASE = "https://once.novai.su";

        async function query() {
            const key = document.getElementById("apiKey").value.trim();
            const btn = document.getElementById("queryBtn");
            const result = document.getElementById("result");

            if (!key) {
                showError("请输入 API Key");
                return;
            }

            btn.disabled = true;
            btn.textContent = "查询中...";
            result.className = "result";

            try {
                const headers = {"Authorization": "Bearer " + key};

                const [subResp, usageResp] = await Promise.all([
                    fetch(API_BASE + "/v1/dashboard/billing/subscription", {headers}),
                    fetch(API_BASE + "/v1/dashboard/billing/usage?start_date=2024-01-01&end_date=2026-12-31", {headers})
                ]);

                if (!subResp.ok || !usageResp.ok) {
                    throw new Error("Key 无效或已过期");
                }

                const subData = await subResp.json();
                const usageData = await usageResp.json();

                const total = subData.hard_limit_usd || 0;
                const used = usageData.total_usage || 0;
                const remaining = Math.max(0, total - used);

                result.className = "result success show";
                result.innerHTML =
                    '<div class="balance-label">剩余额度</div>' +
                    '<div class="balance-value">' + remaining.toFixed(2) + '<span class="balance-unit">$</span></div>' +
                    '<div class="stats">' +
                        '<div class="stat-item">' +
                            '<div class="stat-label">总额度</div>' +
                            '<div class="stat-value">' + total.toFixed(2) + ' $</div>' +
                        '</div>' +
                        '<div class="stat-item">' +
                            '<div class="stat-label">已使用</div>' +
                            '<div class="stat-value">' + used.toFixed(2) + ' $</div>' +
                        '</div>' +
                    '</div>';

            } catch (e) {
                showError(e.message);
            }

            btn.disabled = false;
            btn.textContent = "查询";
        }

        function showError(msg) {
            const result = document.getElementById("result");
            result.className = "result error show";
            result.innerHTML = '<div class="error-text">' + msg + '</div>';
        }

        document.getElementById("apiKey").addEventListener("keydown", function(e) {
            if (e.key === "Enter") query();
        });
    </script>
</body>
</html>
